services:
  dinner-planner:
    build:
      context: .
      network: host
    container_name: dinner-planner
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - dinner-planner-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=file:/app/data/dinner.db
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - TZ=${TZ:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4-e4b}
      - LLM_MODE=${LLM_MODE:-disabled}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - VIDEO_STORAGE_LIMIT_MB=${VIDEO_STORAGE_LIMIT_MB:-10240}
      - YTDLP_PATH=${YTDLP_PATH:-yt-dlp}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development service with hot reload
  dev:
    profiles: ['dev']
    build:
      context: .
      target: builder
    container_name: dinner-planner-dev
    ports:
      - '3000:3000'
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
      - dinner-planner-data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=file:/app/data/dinner.db
      - JWT_SECRET=dev-secret-key-at-least-32-characters
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=http://localhost:5173
      - TZ=${TZ:-}
    command: pnpm dev

volumes:
  dinner-planner-data:
