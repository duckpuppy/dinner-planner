name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dinner-planner/shared build

      - name: Build web app
        run: pnpm --filter @dinner-planner/web build
        env:
          NODE_ENV: production

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dinner-planner-debug-${{ github.sha }}
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK to release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          name: Dinner Planner ${{ github.ref_name }}
