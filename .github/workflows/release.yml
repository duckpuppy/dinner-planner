name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3) — leave blank to auto-calculate from conventional commits'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: next-version
        uses: conventional-actions/next-version@v1

      - name: Resolve version
        id: version
        run: |
          INPUT="${{ github.event.inputs.version }}"
          CALCULATED="${{ steps.next-version.outputs.version }}"
          BUMPED="${{ steps.next-version.outputs.bumped }}"

          if [ -n "$INPUT" ]; then
            # User provided a version — validate and use it
            if ! echo "$INPUT" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid version format. Use v1.2.3"
              exit 1
            fi
            VERSION="$INPUT"
          elif [ "$BUMPED" = "true" ]; then
            VERSION="$CALCULATED"
          else
            echo "No releasable commits found since last tag (no feat/fix/breaking changes)."
            echo "To release anyway, provide a version manually."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION (release-type: ${{ steps.next-version.outputs.release-type }})"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version in package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version ${VERSION#v} --no-git-tag-version --workspaces=false

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin HEAD:main
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
